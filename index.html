<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Love or Pop Bingo</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fce4ec;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        h1 { color: #d81b60; font-size: 1.6rem; margin: 15px 0; text-align: center; }
        
        #bingo-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            width: 95vw;
            max-width: 500px;
            background-color: #d81b60;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            /* This ensures the red box stays visible even if empty */
            min-height: 200px; 
        }
        
        .cell {
            background-color: white;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4px;
            font-size: 2.2vw;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            line-height: 1.1;
            word-wrap: break-word;
            color: #333;
            -webkit-user-select: none;
            user-select: none;
        }

        @media (min-width: 600px) {
            .cell { font-size: 13px; }
            #bingo-grid { gap: 10px; padding: 12px; width: 500px; }
        }

        .cell.selected {
            background-color: #f06292 !important;
            color: white !important;
        }
        
        .free-space {
            background-color: #f8bbd0;
            color: #d81b60;
            border: 2px dashed #d81b60;
        }

        .controls { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; width: 100%; align-items: center; }
        
        button {
            padding: 15px 25px;
            width: 85%;
            max-width: 300px;
            font-size: 16px;
            font-weight: bold;
            background-color: #d81b60;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
