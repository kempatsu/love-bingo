    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fce4ec;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 5px;
            margin: 0;
            min-height: 100vh;
        }
        h1 { color: #d81b60; font-size: 1.6rem; margin: 10px 0; text-align: center; }
        
        /* This shell forces the contents to stay inside */
        .bingo-shell {
            background-color: #d81b60;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            width: 95vw;
            max-width: 500px;
        }

        #bingo-grid {
            display: flex;
            flex-wrap: wrap;
            width: 100%;
            justify-content: center;
        }
        
        .cell {
            background-color: white;
            /* Force exactly 5 per row minus the gaps */
            width: calc(20% - 4px); 
            aspect-ratio: 1 / 1;
            margin: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2px;
            font-size: 2.1vw;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            line-height: 1.1;
            word-wrap: break-word;
            color: #333;
            overflow: hidden;
        }

        @media (min-width: 600px) {
            .cell { font-size: 12px; }
            .bingo-shell { padding: 12px; }
        }

        .cell.selected {
            background-color: #f06292 !important;
            color: white !important;
        }
        
        .free-space {
            background-color: #f8bbd0;
            color: #d81b60;
            border: 1.5px dashed #d81b60;
        }

        .controls { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; width: 100%; align-items: center; }
        
        button {
            padding: 15px 25px;
            width: 85%;
            max-width: 300px;
            font-size: 16px;
            font-weight: bold;
            background-color: #d81b60;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        button.shuffle { background-color: #ec407a; }
        .reset { margin-top: 15px; color: #ad1457; font-size: 12px; text-decoration: underline; cursor: pointer; padding: 10px; }
    </style>
</head>
